name: Mudarris Al-Arab Agent

on:
  schedule:
    # Runs at 10:30 PM UTC (4:00 AM IST daily)
    - cron: '30 22 * * *' 
  workflow_dispatch: # Manual trigger button

permissions:
  contents: write 

jobs:
  generate-lesson:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping."
          fi

      - name: Lesson Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python lesson.py

      - name: Commit and push changes
        run: |
          # 1. Identity: Link to masterrkoffl to show the premium bot logo
          git config --local user.email "143505051+masterrkoffl@users.noreply.github.com"
          git config --local user.name "m365-bot"
          
          git add lessons/ last_lesson.json
          
          # 2. Credit: Link to ravikiranoffl for the 365-day green calendar streak
          git commit -m "Automated MSA Lesson Generation" -m "Co-authored-by: ravikiranoffl <171322216+ravikiranoffl@users.noreply.github.com>" || echo "No changes to commit"
          
          git push
